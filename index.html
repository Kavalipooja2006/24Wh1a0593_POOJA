<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Weather Graph App</h2>

<input type="text" id="city" placeholder="Enter city name">
<button onclick="getWeather()">Get Weather</button>

<canvas id="weatherChart" width="400" height="200"></canvas>

<script>
const API_KEY = "YOUR_API_KEY";

// Arrow Function + Async/Await
const getWeather = async () => {
  const city = document.getElementById("city").value;

  try {
    // Promise (fetch)
    const response = await fetch(
      `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${API_KEY}`
    );

    const data = await response.json();

    // Callback (map)
    const temps = data.list.slice(0, 8).map(item => item.main.temp);
    const labels = data.list.slice(0, 8).map(item => item.dt_txt);

    drawChart(labels, temps);

  } catch (error) {
    console.log("Error:", error);
  }
};

// Graph using Chart.js
const drawChart = (labels, temps) => {
  const ctx = document.getElementById("weatherChart").getContext("2d");

  new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Temperature (°C)",
        data: temps
      }]
    }
  });
};
</script>

</body>
</html>
