<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVRIT E-Commerce</title>

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#e6e1e1;
}

/* ===== HEADER ===== */
.header{
    background:#4CAF50;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* ===== SIDEBAR ===== */
.sidebar{
    position:fixed;
    width:220px;
    height:100%;
    background:#0e4a7b;
    padding-top:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    font-weight:bold;
}

.sidebar a:hover{
    background:#1b6aa8;
}

/* ===== MAIN AREA ===== */
.main{
    margin-left:240px;
    padding:40px;
}

/* ===== CARD ===== */
.card{
    width:500px;
    margin:auto;
    background:linear-gradient(to right,#12c2e9,#2af598);
    padding:25px;
    border-radius:6px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card h2{
    text-align:center;
    color:#004aad;
}

/* ===== FORM ===== */
.form-group{
    display:flex;
    gap:15px;
    margin-bottom:15px;
}

.form-group input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:4px;
}

.gender{
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2b6cff;
    color:white;
    font-size:16px;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#1c4fd8;
}

/* ===== FOOTER ===== */
.footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:60px;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
    BVRIT E-COMMERCE | Welcome,
    <span id="username"></span>
</div>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <a href="#">REGISTRATION</a>
    <a href="#">LOGIN</a>
    <a href="#">CATALOG</a>
    <a href="#">CART</a>
    <a href="#">LOGOUT</a>
</div>

<!-- ===== MAIN CONTENT ===== -->
<div class="main">

    <div class="card">
        <h2>Create Account</h2>

        <form onsubmit="return registerUser()">

            <div class="form-group">
                <input type="text" placeholder="Enter your full name" required>
                <input type="password" placeholder="Enter a password" required>
            </div>

            <div class="form-group">
                <input type="email" placeholder="Enter your email" required>
                <input type="password" placeholder="Confirm your password" required>
            </div>

            <div class="gender">
                <b>Gender:</b>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
                <input type="radio" name="gender"> Other
            </div>

            <button type="submit">Submit</button>

            <p style="text-align:center;margin-top:10px;">
                Explore our Product Catalog
            </p>

        </form>
    </div>

</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
    © 2024 BVRIT. All rights reserved.<br>
    Contact us: info@bvrit.com
</div>

<!-- ===== JAVASCRIPT ===== -->
<script>

/* Display username in heading */
document.getElementById("username").innerText =
    "Pooja_24wh1a0593";

/* Registration action */
function registerUser(){
    alert("Registration Successful!");
    return false;
}

</script>

</body>
</html>
